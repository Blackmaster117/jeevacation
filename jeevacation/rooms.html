    }

    nav input[type="checkbox"],

      display: none;
    }

    @media (max-width: 576px) {
      input[type="checkbox"]:not(:checked) + ul {
        display: none;
      }

      nav {
        flex-direction: row;
        flex-wrap: wrap;
        margin-left: 0;
        margin-right: 0;
      }

      nav label {
        text-align: right;
        display: block;
        padding: 0.5em;
        line-height: 1.6em;
        align-self: center;
      }

       nav ul {
        display: block;
      }

       nav ul:last-child {
        width: 100%;
        flex-basis: 100%;
      }

      nav ul li {
        margin-bottom: 0;
        width: 100%;
        text-align: right;
        padding: 0.5em;
      }
    }
